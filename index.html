<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENYAKROW</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
}

/* HERO (negro limpio por ahora) */
.hero {
    height: 100vh;
    display: flex;
    align-items: flex-end;
    padding: 40px;
}

.hero h1 {
    font-size: 60px;
}

/* MARQUEE SIMPLE */
.marquee {
    background: #fff;
    color: #000;
    padding: 10px 0;
    white-space: nowrap;
    overflow: hidden;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* ABOUT */
.about {
    padding: 60px 20px;
    max-width: 600px;
}

.about p {
    color: #aaa;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr;
}

@media(min-width: 768px){
    .grid {
        grid-template-columns: 1fr 1fr;
    }
}

/* VIDEO */
.video {
    border-top: 1px solid #222;
}

.video iframe {
    width: 100%;
    height: 300px;
    border: none;
}

/* CONTACTO */
.contact {
    padding: 60px 20px;
}

.contact a {
    display: block;
    color: #fff;
    margin-bottom: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>BENYAKROW</h1>
</div>

<!-- MARQUEE -->
<div class="marquee">
    <span>SANTIAGO — CHILE /// RAVE CULTURE /// LIVE ENERGY ///</span>
</div>

<!-- ABOUT -->
<div class="about">
    <p>
    Registro la cultura electrónica desde dentro.  
    Energía real, sin filtros.
    </p>
</div>

<!-- VIDEOS -->
<div class="grid">

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO1"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO2"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO3"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO4"></iframe>
    </div>

</div>

<!-- CONTACTO -->
<div class="contact">
    <a href="mailto:tu@email.com">MAIL</a>
    <a href="https://instagram.com/tuusuario">INSTAGRAM</a>
</div>

</body>
</html>
