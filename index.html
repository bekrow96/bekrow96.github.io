<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet">

<title>BENYAKROW</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
}

/* HERO (negro limpio por ahora) */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.hero iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none;
    z-index: 1; /* video abajo */
}

.hero-text {
    position: absolute;
    bottom: 40px;
    left: 30px;
    z-index: 2; /* 🔥 texto arriba */
}

.hero-text h1 {
    font-family: 'Boldonse', sans-serif;
    font-size: clamp(40px, 10vw, 120px);
    line-height: 0.9;
    margin: 0;
    letter-spacing: -2px;
}
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
}

/* MARQUEE SIMPLE */
.marquee {
    background: #fff;
    color: #000;
    padding: 10px 0;
    white-space: nowrap;
    overflow: hidden;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* ABOUT */
.about {
    padding: 60px 20px;
    max-width: 600px;
}

.about p {
    color: #aaa;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr;
}

@media(min-width: 768px){
    .grid {
        grid-template-columns: 1fr 1fr;
    }
}

/* VIDEO */
.video {
    border-top: 1px solid #222;
}

.video iframe {
    width: 100%;
    height: 300px;
    border: none;
}

/* CONTACTO */
.contact {
    padding: 60px 20px;
}

.contact a {
    display: block;
    color: #fff;
    margin-bottom: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <iframe ...></iframe>

    <div class="hero-text">
        <h1>BENYAKROW</h1>
    </div>
</div>
</div>
<!-- MARQUEE -->
<div class="marquee">
    <span>SANTIAGO — CHILE /// RAVE CULTURE /// LIVE ENERGY ///</span>
</div>

<!-- ABOUT -->
<div class="about">
    <p>
    Registro la cultura electrónica desde dentro.  
    Energía real, sin filtros.
    </p>
</div>

<!-- VIDEOS -->
<div class="grid">

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO1"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO2"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO3"></iframe>
    </div>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/VIDEO4"></iframe>
    </div>

</div>

<!-- CONTACTO -->
<div class="contact">
    <a href="mailto:tu@email.com">MAIL</a>
    <a href="https://instagram.com/tuusuario">INSTAGRAM</a>
</div>

</body>
</html>
